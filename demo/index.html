<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CMFStack — Decision & Verification Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f8;--bg2:#fff;--bg3:#e8e6ef;--fg:#1a1a2e;--fg2:#333;--fg3:#666;--fg4:#777;
  --border:#e0dce8;--accent:#6c47d9;--accent2:#6c47d9;--accent-bg:#6c47d910;
  --green:#0d652d;--green-bg:#e6f4ea;--orange:#e65100;--orange-bg:#fff3e0;
  --red:#b71c1c;--red-bg:#fce4ec;--purple:#6b21a8;--purple-bg:#f3e8fd;
  --card:#fff;--header-bg:rgba(255,255,255,.95);
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--fg);overflow-x:hidden;font-size:clamp(14px,1vw,16px)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadBar{from{width:0}to{width:100%}}
#splash{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:48px;font-weight:800;color:#f0f0f5;letter-spacing:-2px;animation:fadeIn .8s ease}
#splash h1 span{color:#6366f1}
#splash p{font-size:13px;color:#606070;letter-spacing:3px;text-transform:uppercase;animation:fadeIn 1.2s ease}
#splash .bar{margin-top:40px;width:200px;height:2px;background:#1a1a22;border-radius:2px;overflow:hidden}
#splash .bar div{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:2px;animation:loadBar 2s ease forwards}
#app{display:none;height:100vh;flex-direction:column}
header{border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:clamp(48px,4vw,60px);background:var(--header-bg);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{font-size:22px;font-weight:800;letter-spacing:-1px}.logo span{color:var(--accent)}
.nav{display:flex;gap:3px;background:var(--bg3);border-radius:18px;padding:3px}
.nav button{background:transparent;color:var(--fg4);border:none;border-radius:14px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:all .15s}
.nav button.active{background:var(--accent);color:#fff}
.nav button:hover:not(.active){color:var(--fg3)}
.top-right{display:flex;align-items:center;gap:10px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent)}
.main-wrap{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:clamp(180px,14vw,240px);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--bg2);padding:10px 0}
.sb-section{padding:0 14px 6px;font-size:11px;font-weight:700;color:var(--fg4);text-transform:uppercase;letter-spacing:1.2px;margin-top:10px}
.sb-section:first-child{margin-top:0}
.library-item{padding:8px 14px;cursor:pointer;font-size:15px;font-weight:500;color:var(--fg3);border-left:3px solid transparent;transition:all .12s;display:flex;align-items:center;gap:6px}
.library-item:hover{background:var(--accent-bg);color:var(--fg2)}
.library-item.active{color:var(--accent);font-weight:700;background:var(--accent-bg);border-left-color:var(--accent)}
.library-icon{font-size:14px}
.product{border-bottom:1px solid var(--border)}
.product:first-of-type{border-top:1px solid var(--border)}
.product-header{display:flex;align-items:center;padding:9px 14px;cursor:pointer;font-size:15px;font-weight:600;color:var(--fg2);transition:background .12s;user-select:none}
.product-header:hover{background:var(--accent-bg)}
.product-header.active{color:var(--accent)}
.product-header .arrow{font-size:10px;color:var(--fg4);transition:transform .2s;margin-right:6px;width:12px;display:inline-block}
.product-header.open .arrow{transform:rotate(90deg)}
.product-header .p-name{flex:1}
.product-zones{overflow:hidden;max-height:0;transition:max-height .25s ease}
.product-zones.open{max-height:800px}
.zone-item{padding:6px 14px 6px 32px;cursor:pointer;font-size:14px;color:var(--fg3);border-left:2px solid transparent;transition:all .12s;display:flex;align-items:center;justify-content:space-between}
.zone-item:hover{background:var(--accent-bg);color:var(--fg2)}
.zone-item.active{color:var(--accent);font-weight:600;border-left-color:var(--accent);background:var(--accent-bg)}
.zone-item .del{opacity:0;cursor:pointer;font-size:13px;color:var(--fg4);transition:all .12s;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.zone-item:hover .del{opacity:1}
.zone-item .del:hover{color:var(--red);background:var(--red-bg)}
.add-zone-btn{padding:5px 14px 5px 32px;font-size:13px;color:var(--fg4);cursor:pointer;transition:color .12s}
.add-zone-btn:hover{color:var(--accent)}
.add-product-btn{padding:10px 14px;cursor:pointer}
.add-product-btn button{width:100%;padding:7px 0;border:1.5px dashed var(--border);background:transparent;border-radius:8px;cursor:pointer;font-size:13px;color:var(--fg4);font-family:'DM Sans';transition:all .15s}
.add-product-btn button:hover{border-color:var(--accent);color:var(--accent)}

/* Content */
.content{flex:1;display:flex;overflow:hidden}
.mat-list{width:clamp(280px,22vw,380px);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--bg2)}
.mat-list .top-bar{padding:9px 14px;font-size:13px;color:var(--fg4);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.compare-toggle{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer}
.compare-toggle input{accent-color:var(--accent)}
.mat-row{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .1s;position:relative}
.mat-row:hover{background:var(--accent-bg)}
.mat-row.active{background:var(--accent-bg);border-left-color:var(--accent)}
.mat-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.mat-sw{width:clamp(42px,3vw,56px);height:clamp(42px,3vw,56px);border-radius:7px;overflow:hidden;flex-shrink:0}
.mat-sw img{width:100%;height:100%;object-fit:cover}
.mat-info{flex:1;min-width:0}
.mat-info h4{font-size:14px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0}
.mat-info p{font-size:12px;color:var(--fg4);margin:2px 0 0}
.badge{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.b-approved{background:var(--green-bg);color:var(--green)}
.b-shortlisted{background:var(--orange-bg);color:var(--orange)}
.b-rejected{background:var(--red-bg);color:var(--red)}
.b-pending{background:var(--purple-bg);color:var(--purple)}

.compare-bar{padding:8px 14px;background:var(--accent-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.compare-bar span{font-size:13px;color:var(--accent);font-weight:600}
.compare-bar button{padding:6px 16px;border:1.5px solid var(--accent);background:var(--accent);color:#fff;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans'}
.compare-bar .clear{background:transparent;color:var(--accent);border-color:var(--border);margin-left:6px}

.detail{flex:1;overflow-y:auto;padding:22px;animation:fadeIn .25s ease}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--fg4);font-size:13px}
.d-head{display:flex;gap:18px}
.d-img{width:clamp(130px,10vw,200px);height:clamp(130px,10vw,200px);border-radius:10px;overflow:hidden;flex-shrink:0}
.d-img img{width:100%;height:100%;object-fit:cover}
.d-meta h2{font-size:24px;font-weight:700;color:var(--fg);margin:0 0 4px}
.d-meta .sub{font-size:14px;color:var(--fg4);margin:0 0 12px}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.spec{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.spec .lbl{font-size:11px;color:var(--fg4);text-transform:uppercase;letter-spacing:.7px}
.spec .val{font-size:15px;font-weight:700;color:var(--fg);margin-top:1px}
.actions{display:flex;gap:6px;margin-top:16px}
.actions button{flex:1;padding:clamp(6px,0.6vw,10px) 4px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--fg3);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans';transition:all .12s;white-space:nowrap}
.actions button:hover{border-color:var(--accent);color:var(--accent)}
.actions .on-a{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.actions .on-s{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
.actions .on-r{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.actions .viz{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.preview{margin-top:20px}
.preview h3{font-size:15px;color:var(--fg);margin:0 0 10px}
.preview .iw{border-radius:10px;overflow:hidden;position:relative;max-width:80%}
.preview img{width:100%;display:block}
.preview .dots{position:absolute;bottom:8px;right:8px;display:flex;gap:4px}
.preview .dot{width:clamp(26px,2vw,34px);height:clamp(26px,2vw,34px);border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.5);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.preview .dot.on{border-color:var(--accent);background:var(--accent)}
.comments{margin-top:20px}
.comments h3{font-size:15px;color:var(--fg);margin:0 0 12px}
.cmt{display:flex;gap:8px;margin-bottom:10px}
.cmt .av{width:30px;height:30px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0}
.cmt .nm{font-size:13px;font-weight:600;color:var(--fg2)}
.cmt .mt{font-size:12px;color:var(--fg4);font-weight:400}
.cmt .tx{font-size:13px;color:var(--fg3);margin-top:2px}

.tab-p{flex:1;overflow-y:auto;padding:22px}
.cg{display:grid;gap:14px}.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cc .ci{height:clamp(120px,10vw,180px);overflow:hidden}.cc .ci img{width:100%;height:100%;object-fit:cover}
.cc .cb{padding:12px}.cc h4{font-weight:700;font-size:15px;margin:0 0 5px;color:var(--fg)}
.cr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px}
.cr .k{color:var(--fg4)}.cr .v{font-weight:600;color:var(--fg2)}
.vw{border-radius:10px;overflow:hidden;position:relative}
.vw img{width:100%;display:block}
.vc{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;background:rgba(0,0,0,.55);border-radius:18px;padding:4px 10px}
.vc button{padding:5px 14px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,.7);font-family:'DM Sans'}
.vc button.on{background:var(--accent);color:#fff}
.sz{margin-bottom:20px}
.sz .zl{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sc-wrap{display:flex;gap:10px;flex-wrap:wrap}
.sc{width:130px;background:var(--card);border-radius:8px;overflow:hidden;border:1.5px solid var(--green-bg)}
.sc .si{height:clamp(80px,7vw,120px);overflow:hidden}.sc .si img{width:100%;height:100%;object-fit:cover}
.sc .sn{padding:8px 10px;font-size:14px;font-weight:600;color:var(--fg2)}
.ai-h{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ai-ic{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px}
.ai-h h2{font-size:17px;color:var(--fg);margin:0}
.ai-h p{font-size:13px;color:var(--fg4);margin:0}
.ac{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.ac .at{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ac .an{font-weight:700;font-size:16px;color:var(--fg)}
.ac .as{background:var(--bg3);color:var(--fg4);padding:3px 10px;border-radius:10px;font-size:13px;font-weight:700}
.ac .ad{font-size:14px;color:var(--fg3);margin:0 0 10px}
.ac .vb{padding:6px 14px;border:1.5px solid var(--accent);background:var(--accent-bg);color:var(--accent);border-radius:7px;cursor:pointer;font-weight:600;font-size:13px;font-family:'DM Sans'}


.lib-btn{padding:5px 0;border:1px solid var(--border);background:transparent;color:var(--fg4);border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans';white-space:nowrap;text-align:center;transition:all .12s;flex:1}
.lib-btn:hover{border-color:var(--accent);color:var(--accent)}
.lib-btn-shortlisted{border-color:var(--orange);background:var(--orange-bg);color:var(--orange)}
.lib-btn-compared{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.edit-input{background:transparent;border:none;border-bottom:1.5px solid var(--accent);color:var(--fg);font-size:14px;font-family:'DM Sans';outline:none;width:100%;padding:2px 0}

.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(160px,12vw,240px),1fr));gap:clamp(12px,1vw,20px);padding:22px}
.lib-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .12s}
.lib-card.compared{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.lib-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(108,71,217,.1)}
.lib-card .li{height:clamp(110px,9vw,170px);overflow:hidden}
.lib-card .li img{width:100%;height:100%;object-fit:cover}
.lib-card .lb{padding:10px}
.lib-card .lb h4{font-size:14px;font-weight:600;margin:0 0 3px;color:var(--fg)}
.lib-card .lb p{font-size:12px;color:var(--fg4);margin:0}

@media(max-width:1024px){
  .sidebar{width:170px!important}
  .mat-list{width:260px!important}
  .d-head{flex-direction:column}
  .d-img{width:100%!important;height:200px!important}
  .preview .iw{max-width:100%!important}
  .actions{flex-wrap:wrap}
  .actions button{min-width:45%}
}
@media(max-width:768px){
  .main-wrap{flex-direction:column}
  .sidebar{width:100%!important;border-right:none;border-bottom:1px solid var(--border);max-height:200px;overflow-y:auto}
  .content{flex-direction:column}
  .mat-list{width:100%!important;max-height:250px;border-right:none;border-bottom:1px solid var(--border)}
  .detail{min-height:400px}
  .nav{overflow-x:auto;flex-shrink:0}
  .nav button{white-space:nowrap}
  .lib-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))!important}
}
</style>
</head>
<body>
<div id="splash">
  <h1>CMF<span>Stack</span></h1>
  <p>Decision &amp; Verification Platform</p>
  <div class="bar"><div></div></div>
</div>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="logo">CMF<span>Stack</span></div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="top-right">
      <div class="avatar">JD</div>
    </div>
  </header>
  <div class="main-wrap">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

    {id:"m11",product:"p1",zone:"z4",name:"Burl Wood Accent",type:"Wood veneer",supplier:"Tabu S.p.A",cost:"£72/unit",dur:"Medium",sus:"B",img:IMGS.console_wood_accent,status:"pending"},
    {id:"m12",product:"p1",zone:"z5",name:"Perforated Leather",type:"Leather",supplier:"Bader GmbH",cost:"£18/unit",dur:"V.High",sus:"B+",img:IMGS.steering_perforated_leather,status:"approved"}
  ]
};

let nextId=100;
function uid(){return"x"+(nextId++)}

// --- Actions ---
function setTab(t){state.tab=t;state.selMat=null;render()}
function goLibrary(){state.view="library";state.tab="Browse";state.selMat=null;state.compareMode=false;render()}
function goProduct(pid){state.view="product";state.activeProduct=pid;state.activeZone=null;state.tab="Materials";state.selMat=null;render()}
function toggleProduct(pid){const p=state.products.find(x=>x.id===pid);if(p)p.open=!p.open;render()}
function selectZone(pid,zid){state.view="product";state.activeProduct=pid;state.activeZone=zid;state.tab="Materials";state.selMat=null;render()}
function selectAllZones(pid){state.view="product";state.activeProduct=pid;state.activeZone=null;state.tab="Materials";state.selMat=null;render()}
function addProduct(){
  const id=uid();
  state.products.push({id,name:"New Product",open:true,zones:[]});
  state.view="product";state.activeProduct=id;state.activeZone=null;state.tab="Materials";
  state.editingProduct=id;render();
  setTimeout(()=>{const el=document.getElementById("edit-"+id);if(el)el.focus()},50);
}
function addZone(pid){
  const p=state.products.find(x=>x.id===pid);if(!p)return;
  const id=uid();p.zones.push({id,name:"New Zone"});p.open=true;
  state.editingZone=id;render();
  setTimeout(()=>{const el=document.getElementById("edit-"+id);if(el)el.focus()},50);
}
function finishEditZone(zid,val){
  for(const p of state.products){const z=p.zones.find(x=>x.id===zid);if(z){z.name=val||"Untitled";break;}}
  state.editingZone=null;render();
}
function finishEditProduct(pid,val){
  const p=state.products.find(x=>x.id===pid);if(p)p.name=val||"Untitled";
  state.editingProduct=null;render();
}
function removeZone(pid,zid){
  const p=state.products.find(x=>x.id===pid);if(p)p.zones=p.zones.filter(z=>z.id!==zid);
  if(state.activeZone===zid)state.activeZone=null;render();
}
function selectMat(id){state.selMat=id;render()}
function setStatus(id,s){const m=state.materials.find(x=>x.id===id);if(m)m.status=s;render()}
function setInt(i){state.intIdx=i;render()}
function toggleCompareMode(){state.compareMode=!state.compareMode;if(!state.compareMode)state.compareSet.clear();render()}
function toggleCompare(id,ev){
  ev.stopPropagation();
  if(state.compareSet.has(id))state.compareSet.delete(id);else state.compareSet.add(id);
  render();
}
function goCompareTab(){state.tab="Compare";render()}
function clearCompare(){state.compareSet.clear();state.compareMode=false;render()}
function toggleLibShortlist(id){const m=state.materials.find(x=>x.id===id);if(!m)return;m.status=m.status==="shortlisted"?"pending":"shortlisted";render()}
function toggleCompareLib(id){if(state.compareSet.has(id))state.compareSet.delete(id);else state.compareSet.add(id);render()}
function toggleSelProduct(pid){if(!state.selExpanded)state.selExpanded={};state.selExpanded[pid]=!state.selExpanded[pid];render()}

function getZoneName(pid,zid){
  const p=state.products.find(x=>x.id===pid);if(!p)return"";
  const z=p.zones.find(x=>x.id===zid);return z?z.name:"";
}
function filtered(){
  let mats=state.materials.filter(m=>m.product===state.activeProduct);
  if(state.activeZone)mats=mats.filter(m=>m.zone===state.activeZone);
  return mats;
}
function getMat(){return state.materials.find(m=>m.id===state.selMat)}
function bCls(s){return"badge b-"+s}
function bLbl(s){return s.charAt(0).toUpperCase()+s.slice(1)}

function getTabs(){return state.view==="library"?LIBRARY_TABS:ALL_TABS}

// --- Renderers ---
function renderNav(){
  const tabs=getTabs();
  // If current tab not in available tabs, switch to first
  if(!tabs.includes(state.tab))state.tab=tabs[0];
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="${state.tab===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join("");
}

function renderSidebar(){
  let h=`<div class="sb-section">Library</div>`;
  h+=`<div class="library-item ${state.view==='library'?'active':''}" onclick="goLibrary()">All Materials</div>`;

  h+=`<div class="sb-section" style="margin-top:14px">Products</div>`;

  state.products.forEach(p=>{
    const isActive=state.view==="product"&&state.activeProduct===p.id;
    const isOpen=p.open;

    if(state.editingProduct===p.id){
      h+=`<div class="product"><div class="product-header active"><span class="arrow">▶</span><input id="edit-${p.id}" class="edit-input" value="${p.name}" onblur="finishEditProduct('${p.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" style="flex:1"/></div></div>`;
    } else {
      h+=`<div class="product">
        <div class="product-header ${isActive?'active':''} ${isOpen?'open':''}" onclick="toggleProduct('${p.id}')">
          <span class="arrow">▶</span>
          <span class="p-name" onclick="event.stopPropagation();goProduct('${p.id}')" ondblclick="event.stopPropagation();state.editingProduct='${p.id}';render();setTimeout(()=>{const el=document.getElementById('edit-${p.id}');if(el)el.focus()},50)">${p.name}</span>
        </div>
        <div class="product-zones ${isOpen?'open':''}">
          <div class="zone-item ${isActive&&!state.activeZone?'active':''}" onclick="event.stopPropagation();selectAllZones('${p.id}')"><span>All zones</span><span></span></div>`;

      p.zones.forEach(z=>{
        if(state.editingZone===z.id){
          h+=`<div class="zone-item" style="gap:4px">
            <input id="edit-${z.id}" class="edit-input" value="${z.name}" onblur="finishEditZone('${z.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" style="flex:1"/>
          </div>`;
        } else {
          h+=`<div class="zone-item ${state.activeZone===z.id&&isActive?'active':''}" onclick="event.stopPropagation();selectZone('${p.id}','${z.id}')" ondblclick="event.stopPropagation();state.editingZone='${z.id}';render();setTimeout(()=>{const el=document.getElementById('edit-${z.id}');if(el)el.focus()},50)">
            <span>${z.name}</span>
            <span class="del" onclick="event.stopPropagation();removeZone('${p.id}','${z.id}')" title="Remove zone">−</span>
          </div>`;
        }
      });
      h+=`<div class="add-zone-btn" onclick="event.stopPropagation();addZone('${p.id}')">+ Add Zone</div>`;
      h+=`</div></div>`;
    }
  });

  h+=`<div class="add-product-btn"><button onclick="addProduct()">+ New Product</button></div>`;
  document.getElementById("sidebar").innerHTML=h;
}

function renderMaterials(){
  const mats=filtered();
  const mat=getMat();
  const cCount=state.compareSet.size;

  let list=`<div class="mat-list">`;
  list+=`<div class="top-bar"><span>${mats.length} material${mats.length!==1?'s':''}</span>`;
  list+=`<label class="compare-toggle"><input type="checkbox" ${state.compareMode?'checked':''} onchange="toggleCompareMode()"/> Compare</label></div>`;

  if(state.compareMode&&cCount>0){
    list+=`<div class="compare-bar"><span>${cCount} selected</span><div><button onclick="goCompareTab()">Compare →</button><button class="clear" onclick="clearCompare()">Clear</button></div></div>`;
  }

  mats.forEach(m=>{
    const checked=state.compareSet.has(m.id);
    list+=`<div class="mat-row ${state.selMat===m.id?'active':''}" onclick="selectMat('${m.id}')">`;
    if(state.compareMode){
      list+=`<input type="checkbox" class="mat-check" ${checked?'checked':''} onclick="toggleCompare('${m.id}',event)"/>`;
    }
    list+=`<div class="mat-sw"><img src="${m.img}" alt=""></div>
      <div class="mat-info"><h4>${m.name}</h4><p>${m.type} · ${m.supplier}</p></div>
      <span class="${bCls(m.status)}">${bLbl(m.status)}</span></div>`;
  });
  list+=`</div>`;

  let d=`<div class="detail">`;
  if(!mat){d+=`<div class="detail-empty">Select a material to view details</div>`}
  else{
    const oc=s=>mat.status===s;
    d+=`<div class="d-head"><div class="d-img"><img src="${mat.img}" alt=""></div><div class="d-meta"><h2>${mat.name}</h2><p class="sub">${mat.type} · ${mat.supplier}</p><div class="specs">`;
    [["Cost",mat.cost],["Durability",mat.dur],["Sustainability",mat.sus],["Zone",getZoneName(mat.product,mat.zone)]].forEach(([l,v])=>{d+=`<div class="spec"><div class="lbl">${l}</div><div class="val">${v}</div></div>`});
    d+=`</div></div></div>`;
    d+=`<div class="actions">
      <button class="${oc('approved')?'on-a':''}" onclick="setStatus('${mat.id}','approved')">✓ Approve</button>
      <button class="${oc('shortlisted')?'on-s':''}" onclick="setStatus('${mat.id}','shortlisted')">★ Shortlist</button>
      <button class="${oc('rejected')?'on-r':''}" onclick="setStatus('${mat.id}','rejected')">✕ Reject</button>
      <button class="viz"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Visualise</button></div>`;
    d+=`<div class="preview"><h3>Preview on Interior</h3><div class="iw"><img src="${INTERIORS[state.intIdx]}" alt="">
      <div class="dots">${[0,1,2].map(i=>`<div class="dot ${state.intIdx===i?'on':''}" onclick="setInt(${i})">${i+1}</div>`).join("")}</div></div></div>`;
    d+=`<div class="comments"><h3>Comments &amp; Audit</h3>${COMMENTS.map(c=>`<div class="cmt"><div class="av">${c.i}</div><div><div class="nm">${c.n} <span class="mt">· ${c.r} · ${c.t}</span></div><div class="tx">${c.x}</div></div></div>`).join("")}</div>`;
  }
  d+=`</div>`;
  return list+d;
}

function renderCompare(){
  // Use compare set if populated, otherwise fall back to approved/shortlisted
  let mats;
  if(state.compareSet.size>0){
    mats=state.materials.filter(m=>state.compareSet.has(m.id));
  } else if(state.view==="library"){
    mats=state.materials.filter(m=>state.compareSet.has(m.id));
  } else {
    mats=state.materials.filter(m=>m.product===state.activeProduct&&(m.status==="approved"||m.status==="shortlisted")).slice(0,6);
  }
  const cols=Math.min(mats.length,4);
  let h=`<div class="tab-p"><h2 style="font-size:20px;margin:0 0 6px">Compare Materials</h2>`;
  if(state.compareSet.size>0){
    h+=`<p style="font-size:11px;color:var(--fg4);margin:0 0 14px">${mats.length} materials selected · <span style="color:var(--accent);cursor:pointer" onclick="clearCompare()">Clear selection</span></p>`;
  } else {
    h+=`<p style="font-size:11px;color:var(--fg4);margin:0 0 14px">Showing approved &amp; shortlisted. Use the Compare checkbox in Materials to pick specific items.</p>`;
  }
  h+=`<div class="cg" style="grid-template-columns:repeat(${cols},1fr)">`;
  mats.forEach(m=>{
    h+=`<div class="cc"><div class="ci"><img src="${m.img}" alt=""></div><div class="cb"><h4>${m.name}</h4><span class="${bCls(m.status)}">${bLbl(m.status)}</span><div style="margin-top:10px">`;
    [["Type",m.type],["Supplier",m.supplier],["Cost",m.cost],["Durability",m.dur],["Sustainability",m.sus]].forEach(([k,v])=>{h+=`<div class="cr"><span class="k">${k}</span><span class="v">${v}</span></div>`});
    h+=`</div></div></div>`;
  });
  if(!mats.length)h+=`</div><div class="detail-empty" style="min-height:200px">No materials to compare. Select items using the Compare checkbox in Materials tab.</div>`;
  else h+=`</div>`;
  h+=`</div>`;
  return h;
}

function renderVisualise(){
  const lbl=["Front","Rear","Side"];
  return `<div class="tab-p"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="font-size:20px;margin:0">Interior Visualiser</h2>
    <div style="display:flex;gap:4px;background:var(--bg3);border-radius:18px;padding:3px">${lbl.map((l,i)=>`<button onclick="setInt(${i})" style="padding:7px 18px;border-radius:14px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans';background:${state.intIdx===i?'var(--accent)':'transparent'};color:${state.intIdx===i?'#fff':'var(--fg4)'};transition:all .15s">${l}</button>`).join("")}</div>
    </div>
    <div style="border-radius:10px;overflow:hidden;max-height:calc(100vh - 160px)"><img src="${INTERIORS[state.intIdx]}" alt="" style="width:100%;display:block;max-height:calc(100vh - 160px);object-fit:contain"></div></div>`;
}

function renderSelections(){
  // Determine which products to show
  let productsToShow;
  if(state.view==="library"){
    productsToShow=state.products;
  } else {
    const ap=state.products.find(x=>x.id===state.activeProduct);
    productsToShow=ap?[ap]:[];
  }

  // Build product summaries
  const productData=productsToShow.map(p=>{
    const approved=state.materials.filter(m=>m.product===p.id&&m.status==="approved");
    const zones=p.zones.map(z=>({...z,items:approved.filter(m=>m.zone===z.id)})).filter(z=>z.items.length>0);
    return {id:p.id,name:p.name,zones,total:approved.length};
  }).filter(p=>p.total>0);

  if(!state.selExpanded)state.selExpanded={};

  let h=`<div class="tab-p"><h2 style="font-size:20px;margin:0 0 16px">Saved Selections</h2>`;

  if(!productData.length){
    h+=`<div class="detail-empty" style="min-height:200px">No approved materials yet</div>`;
    h+=`</div>`;
    return h;
  }

  productData.forEach(p=>{
    const isOpen=state.selExpanded[p.id]||false;
    h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden">`;
    h+=`<div onclick="toggleSelProduct('${p.id}')" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .12s;${isOpen?'border-bottom:1px solid var(--border)':''}">`;
    h+=`<div style="display:flex;align-items:center;gap:10px">`;
    h+=`<span style="font-size:10px;color:var(--fg4);transition:transform .2s;display:inline-block;${isOpen?'transform:rotate(90deg)':''}">▶</span>`;
    h+=`<div><div style="font-size:16px;font-weight:700;color:var(--fg)">${p.name}</div>`;
    h+=`<div style="font-size:12px;color:var(--fg4);margin-top:2px">${p.total} approved material${p.total!==1?'s':''} · ${p.zones.length} zone${p.zones.length!==1?'s':''}</div></div>`;
    h+=`</div>`;
    h+=`<span class="badge b-approved">${p.total} Approved</span>`;
    h+=`</div>`;

    if(isOpen){
      h+=`<div style="padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">`;
      p.zones.forEach(z=>{
        z.items.forEach(m=>{h+=`<div class="sc" style="width:auto"><div class="si"><img src="${m.img}" alt=""></div><div class="sn">${m.name}<div style="font-size:12px;color:var(--fg3);font-weight:400;margin-top:2px">${z.name}</div></div></div>`});
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });

  h+=`</div>`;
  return h;
}

function renderAI(){
  const sugs=[
    {n:"Premium Dark",d:"Black leather seats, dark suede headliner, matte black console — cohesive dark luxury.",s:94},
    {n:"Warm Contrast",d:"Cognac seats, walnut door panels, brushed aluminium console — warm and inviting.",s:89},
    {n:"Nordic Light",d:"Cream seats, light grey headliner, brushed aluminium — clean Scandinavian feel.",s:86}
  ];
  let h=`<div class="tab-p"><div class="ai-h"><div><h2>AI Assist</h2><p>Material combination recommendations</p></div></div>`;
  sugs.forEach(s=>{
    h+=`<div class="ac"><div class="at"><div class="an">${s.n}</div><div class="as">${s.s}%</div></div><p class="ad">${s.d}</p><button class="vb"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Visualise Combination</button></div>`;
  });
  h+=`</div>`;
  return h;
}

function renderLibraryGrid(){
  const mats=state.materials;
  const cCount=state.compareSet.size;
  let h=`<div class="tab-p">`;
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">`;
  h+=`<div><h2 style="font-size:17px;margin:0">Material Library</h2><p style="font-size:13px;color:var(--fg4);margin:3px 0 0">${mats.length} materials from all suppliers</p></div>`;
  if(cCount>=2){
    h+=`<div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;color:var(--accent);font-weight:600">${cCount} selected</span><button onclick="state.tab='Compare';render()" style="padding:6px 14px;border:1.5px solid var(--accent);background:var(--accent);color:#fff;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans'">Compare →</button><button onclick="clearCompare()" style="padding:6px 14px;border:1.5px solid var(--border);background:transparent;color:var(--fg3);border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans'">Clear</button></div>`;
  }
  h+=`</div>`;
  h+=`<div class="lib-grid" style="padding:0">`;
  mats.forEach(m=>{
    const isCompare=state.compareSet.has(m.id);
    const isShort=m.status==="shortlisted";
    h+=`<div class="lib-card ${isCompare?'compared':''}" style="position:relative">
      <div class="li"><img src="${m.img}" alt=""></div>
      <div class="lb">
        <h4>${m.name}</h4>
        <p>${m.type} · ${m.supplier}</p>
        <div style="display:flex;gap:4px;margin-top:6px">
          <button class="lib-btn ${isShort?'lib-btn-shortlisted':''}" onclick="event.stopPropagation();toggleLibShortlist('${m.id}')">${isShort?'★ Shortlisted':'☆ Shortlist'}</button>
          <button class="lib-btn ${isCompare?'lib-btn-compared':''}" onclick="event.stopPropagation();toggleCompareLib('${m.id}')">${isCompare?'✓ Compare':'Compare'}</button>
        </div>
      </div>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

function render(){
  renderNav();
  renderSidebar();
  const c=document.getElementById("content");

  if(state.view==="library"){
    if(state.tab==="Browse")c.innerHTML=renderLibraryGrid();
    else if(state.tab==="Compare")c.innerHTML=renderCompare();
    else if(state.tab==="Visualise")c.innerHTML=renderVisualise();
    else if(state.tab==="Selections")c.innerHTML=renderSelections();
    else if(state.tab==="AI Assist")c.innerHTML=renderAI();
    else c.innerHTML=renderLibraryGrid();
  } else {
    if(state.tab==="Materials")c.innerHTML=renderMaterials();
    else if(state.tab==="Compare")c.innerHTML=renderCompare();
    else if(state.tab==="Visualise")c.innerHTML=renderVisualise();
    else if(state.tab==="Selections")c.innerHTML=renderSelections();
    else if(state.tab==="AI Assist")c.innerHTML=renderAI();
  }
}

setTimeout(()=>{
  document.getElementById("splash").classList.add("hide");
  document.getElementById("app").style.display="flex";
  render();
},2200);
</script>
</body>
</html>
